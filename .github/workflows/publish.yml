name: Build and Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        # Match the floor declared by pyproject.toml (requires-python = ">=3.10")
        # and the version used by semantic-release.yml. test.yml runs the
        # matrix 3.10 / 3.11 / 3.12; this publish runner only needs to build
        # a wheel + sdist and run twine check, so any in-matrix version works.
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine sexpdata openpyxl numbers-parser

    - name: Run tests
      run: |
        python -m unittest discover -s tests -v

    - name: Build distribution
      run: |
        python -m build

    - name: Check distribution
      run: |
        python -m twine check dist/*

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
