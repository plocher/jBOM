
fab:
  name: "Generic"
  id: "generic"
  description: "Generic fabricator template"
  dynamic_name: true
  name_source: "manufacturer"

  # Ordered supplier profile IDs (position encodes priority).
  # Generic uses a broad, permissive scope.
  suppliers:
    - generic
    - lcsc
    - mouser
    - digikey
    - farnell
    - newark

  part_number:
    header: "Part Number"

  field_synonyms:
    fab_pn:
      # Generic keeps a neutral preferred-part label because no single fabricator
      # catalog is implied.
      display_name: "Preferred Supplier PN"
    supplier_pn:
      display_name: "Part Number"
    mpn:
      synonyms:
        - "MPN"
        - "MFGPN"
        - "Manufacturer Part Number"
      display_name: "MPN"

  bom_columns:
    "Reference": "reference"
    "Quantity": "jbom:quantity"
    "Description": "description"
    "Value": "value"
    "Package": "package"
    "Footprint": "footprint"
    "Manufacturer": "manufacturer"
    "Part Number": "jbom:fabricator_part_number"
    "DNP": "jbom:dnp"

  pos_columns:
    "Designator": "reference"
    "Mid X": "x"
    "Mid Y": "y"
    "Layer": "side"
    "Rotation": "rotation"
    "Package": "package"

  # Whether jbom fab / plugin should generate designators.csv by default.
  # Set to true in a custom fab profile to enable for all runs with that fabricator.
  generate_designators: false

  # Baseline field set used when users append fields via +syntax (for example,
  # --fields +Value) so additive behavior stays profile-driven and predictable.
  pos_additive_default_fields:
    - "reference"
    - "x"
    - "y"
    - "rotation"
    - "side"
    - "footprint"
    - "package"

  presets:
    default:
      description: "Generic BOM format"
      fields:
        - "reference"
        - "jbom:quantity"
        - "description"
        - "value"
        - "package"
        - "footprint"
        - "manufacturer"
        - "jbom:fabricator_part_number"
        - "jbom:dnp"
    generic:
      description: "Generic preset alias"
      fields:
        - "reference"
        - "jbom:quantity"
        - "description"
        - "value"
        - "manufacturer"
        - "jbom:fabricator_part_number"
        - "jbom:dnp"

  cli_aliases:
    flags: ["--generic"]
    presets: ["+generic"]

  gerbers:
    # Standard 2-layer fabrication layer set. Add In1.Cu, In2.Cu, etc. for
    # multi-layer boards via a project-local .jbom/generic.jbom.yaml override.
    layers:
      - "F.Cu"
      - "B.Cu"
      - "F.Mask"
      - "B.Mask"
      - "F.Paste"
      - "B.Paste"
      - "F.Silkscreen"
      - "B.Silkscreen"
      - "Edge.Cuts"
    naming:
      protel_extensions: true
    drill:
      split_plated_holes: true
      map_format: "gerber"

supplier:
  name: "Generic"
  id: "generic"
  description: "No-op supplier profile (fallback / unknown supplier)"
  website: ""
  field_synonyms:
    supplier_pn:
      display_name: "Supplier"
      synonyms: []
  url_template: null
  search_url_template: null
  part_number: {}

  search:
    providers:
      - type: null_api
        # No fixtures key: returns [] by default

    fields:
      - supplier_part_number
      - price
      - stock_quantity
      - lifecycle_status
      - description

    cache:
      ttl_hours: 24

    # Baseline category → search keyword mapping.
    # Supplier-specific profiles may override individual entries.
    type_query_keywords:
      RES: "resistor"
      CAP: "capacitor"
      IND: "inductor"
      LED: "LED"
      DIO: "diode"
      Z: "zener diode"
      Q: "transistor"
      IC: "IC"
      OSC: "oscillator"
      REG: "regulator"
      CON: "connector"
      CONN: "connector"
      RLY: "relay"
      SWI: "switch"
      FUS: "fuse"
      XFMR: "transformer"
      XTL: "crystal"

defaults:
  # ---------------------------------------------------------------------------
  # Camp 2: Electrical attribute defaults by component category.
  # Used when the designer left a field blank ("default is fine").
  # Surfaced in Mode A for explicit confirmation; never auto-filled.
  # ---------------------------------------------------------------------------
  domain_defaults:
    resistor:
      tolerance: "5%"
    capacitor:
      tolerance: "10%"
      dielectric: "X7R"

  # ---------------------------------------------------------------------------
  # Default power ratings for SMD resistors by package size.
  # ---------------------------------------------------------------------------
  package_power:
    "0402": "63mW"
    "0603": "100mW"
    "0805": "125mW"
    "1206": "250mW"
    "2512": "1W"

  # ---------------------------------------------------------------------------
  # Default voltage ratings for SMD capacitors by package size.
  # ---------------------------------------------------------------------------
  package_voltage:
    "0402": "10V"
    "0603": "25V"
    "0805": "50V"
    "1206": "50V"

  # ---------------------------------------------------------------------------
  # Optional fields to include in the ComponentID hash per component category.
  #
  # CAT, VAL, and PKG are always present in every ComponentID.
  # The fields listed here are the OPTIONAL fields that contribute to identity.
  #
  # Categories NOT listed here fall back to including ALL optional fields
  # (conservative: no information is dropped for unrecognised categories).
  #
  # Available field names (see OPTIONAL_ID_FIELD_DEFS in common/component_id.py):
  #   tolerance  — Tolerance (TOL= in ComponentID)
  #   voltage    — Voltage rating (V= in ComponentID)
  #   current    — Current / Amperage rating (A= in ComponentID)
  #   wattage    — Power / Wattage rating (W= in ComponentID)
  #   type       — Component Type property (TYPE= in ComponentID)
  #
  # To extend: add a new _OptionalIdFieldDef entry in component_id.py first.
  # ---------------------------------------------------------------------------
  component_id_fields:
    res:
      - tolerance
      - voltage    # derating spec
      - wattage
      - type
    cap:
      - tolerance
      - voltage    # critical voltage rating
      - type
    ind:
      - tolerance
      - current    # saturation current
      - type
    led:
      - type       # color / wavelength (encoded in Type field)
                   # voltage/current/wattage omitted: part number is the identity

  # ---------------------------------------------------------------------------
  # Parametric spec fields to include in JLCPCB/LCSC search queries per category.
  # List order reflects preference for query construction.
  # ---------------------------------------------------------------------------
  parametric_query_fields:
    resistor:
      - resistance
      - tolerance
      - package
      - power_rating
      - technology
    capacitor:
      - capacitance
      - tolerance
      - package
      - voltage_rating
      - dielectric

  # ---------------------------------------------------------------------------
  # JLCPCB taxonomy routing for parametric search (category → filter names).
  # ---------------------------------------------------------------------------
  category_route_rules:
    resistor:
      first_sort: "Resistors"
      second_sort_smd: "Chip Resistor - Surface Mount"
      second_sort_pth: "Through Hole Resistors"
    capacitor:
      first_sort: "Capacitors"
      second_sort_mlcc: "Multilayer Ceramic Capacitors (MLCC)"
      second_sort_electrolytic: "Aluminum Electrolytic Capacitors"
    inductor:
      first_sort: "Inductors"
      second_sort_signal: "Inductors (SMD)"
      second_sort_power: "Power Inductors"
      second_sort_ferrite: "Ferrite Beads"
    connector:
      first_sort: "Connectors"

  # ---------------------------------------------------------------------------
  # Canonical schema field synonyms for inventory header intake/output.
  # ---------------------------------------------------------------------------
  field_synonyms:
    manufacturer:
      synonyms:
        - "Manufacturer"
        - "Manufacturer_Name"
        - "Mfr"
        - "MFR"
        - "Brand"
      display_name: "Manufacturer"
    mpn:
      synonyms:
        - "MPN"
        - "MFGPN"
        - "Manufacturer Part Number"
        - "Mfr PN"
        - "Part Number"
        - "PartNumber"
      display_name: "MPN"
    voltage:
      synonyms:
        - "Voltage"
        - "Volts"
        - "V"
      display_name: "Voltage"
    current:
      synonyms:
        - "Current"
        - "Amperage"
        - "A"
      display_name: "Current"
    power:
      synonyms:
        - "Power"
        - "Wattage"
        - "W"
      display_name: "Power"

  # ---------------------------------------------------------------------------
  # Canonical inventory overlay schema contract.
  # This is the single source of truth for:
  # - canonical internal attribute keys used by matcher/overlay/CLI paths
  # - normalized alias tokens that map into canonical keys
  # - source bindings from InventoryItem fields into canonical attributes
  # ---------------------------------------------------------------------------
  inventory_schema:
    canonical_fields:
      - inventory_ipn
      - manufacturer
      - manufacturer_part
      - description
      - datasheet
      - datasheet_name
      - supplier
      - spn
      - tolerance
      - voltage
      - wattage
      - package
      - smd
      - fabricator_part_number
    field_synonyms:
      inventory_ipn:
        display_name: "IPN"
        synonyms:
          - "ipn"
      manufacturer_part:
        display_name: "Manufacturer Part Number"
        synonyms:
          - "mfgpn"
          - "mpn"
          - "manufacturer_part_number"
      wattage:
        display_name: "Power"
        synonyms:
          - "power"
      fabricator_part_number:
        display_name: "Fabricator Part Number"
        synonyms:
          - "fab_pn"
          - "supplier_pn"
    enrichment_bindings:
      inventory_ipn: ipn
      manufacturer: manufacturer
      manufacturer_part: mfgpn
      description: description
      datasheet: datasheet
      datasheet_name: "Datasheet Name"
      supplier: supplier
      spn: spn
      tolerance: tolerance
      voltage: voltage
      wattage: wattage
      package: package
      smd: smd
      fabricator_part_number: __resolved_fabricator_part_number__

  # ---------------------------------------------------------------------------
  # Default CLI search output fields (used when supplier profile has no override).
  # ---------------------------------------------------------------------------
  search:
    package_tokens:
      - "0201"
      - "0402"
      - "0603"
      - "0805"
      - "1206"
      - "1210"
      - "1812"
      - "2010"
      - "2512"
    output_fields:
      default:
        - supplier_part_number
        - manufacturer
        - mpn
        - package
        - category
        - price
        - description

  # ---------------------------------------------------------------------------
  # Component categories excluded from supplier catalog search.
  # Items whose normalized category matches any entry here are silently skipped
  # before any query is built.  All other categories are searchable (denylist model).
  # ---------------------------------------------------------------------------
  search_excluded_categories:
    - SLK      # silk-screen labels
    - BOARD    # PCB board outline / edge cuts
    - DOC      # documentation / drawing symbols
    - MECH     # mechanical (mounting holes, standoffs)
    - UNKNOWN  # unclassified / unrecognised KiCad components

  # ---------------------------------------------------------------------------
  # Camp 2/3 attribute classification per component category.
  # show_in_mode_a: Camp 2 — surfaced for explicit designer confirmation in Mode A.
  # suppress:       Camp 3 — silently filtered from Mode A display and write-back.
  # ---------------------------------------------------------------------------
  enrichment_attributes:
    resistor:
      show_in_mode_a:
        - tolerance
        - power_rating
        - voltage_rating
        - technology
      suppress:
        - pricing
        - stock
        - lead_time
        - eia_land_pattern
        - series
        - packaging
    capacitor:
      show_in_mode_a:
        - tolerance
        - voltage_rating
        - dielectric
        - temperature_coefficient
      suppress:
        - pricing
        - stock
        - lead_time
        - eia_land_pattern
        - series
        - packaging
    inductor:
      show_in_mode_a:
        - tolerance
        - current_rating
        - dcr
      suppress:
        - pricing
        - stock
        - lead_time
        - series
        - packaging

presets:
  minimal:
    description: "Minimal BOM with essential fields only"
    fields:
      - "reference"
      - "jbom:quantity"
      - "value"
      - "jbom:fabricator_part_number"  # This maps to LCSC via generic fabricator

  standard:
    description: "Standard BOM with comprehensive part information"
    fields:
      - "reference"
      - "jbom:quantity"
      - "value"
      - "description"
      - "footprint"
      - "manufacturer"
      - "jbom:fabricator_part_number"
      - "datasheet"
