
fab:
  name: "Seeed Studio"
  id: "seeed"
  description: "Seeed Studio Fusion PCBA"
  website: "https://www.seeedstudio.com/fusion_pcb.html"

  # Ordered supplier profile IDs (position encodes priority).
  suppliers:
    - seeed
    - mouser
    - digikey
    - farnell
    - newark

  part_number:
    header: "Seeed Part Number"

  field_synonyms:
    fab_pn:
      # Seeed keeps a generic preferred-part label to allow mixed supplier
      # sourcing while retaining Seeed-specific export headers in bom_columns.
      display_name: "Preferred Supplier PN"
    supplier_pn:
      display_name: "Supplier Part Number"
    mpn:
      synonyms:
        - "MPN"
        - "MFGPN"
        - "Manufacturer Part Number"
      display_name: "MPN"

  bom_columns:
    "Designator": "reference"
    "Quantity": "jbom:quantity"
    "Value": "value"
    "Package": "inv:package"
    "Seeed Part Number": "jbom:fabricator_part_number"

  pos_columns:
    "Designator": "reference"
    "Mid X": "x"
    "Mid Y": "y"
    "Layer": "side"
    "Rotation": "rotation"

  presets:
    default:
      description: "Standard Seeed format"
      fields:
        - "reference"
        - "jbom:quantity"
        - "inv:package"
        - "jbom:fabricator_part_number"

  cli_aliases:
    flags: ["--seeed"]
    presets: ["+seeed"]

  gerbers:
    layers:
      - "F.Cu"
      - "B.Cu"
      - "F.Mask"
      - "B.Mask"
      - "F.Paste"
      - "B.Paste"
      - "F.Silkscreen"
      - "B.Silkscreen"
      - "Edge.Cuts"
    naming:
      protel_extensions: true
    drill:
      split_plated_holes: true
      map_format: "gerber"

supplier:
  id: "seeed"
  name: "Seeed Studio"

  # Canonical supplier field synonym map.
  field_synonyms:
    supplier_pn:
      display_name: "Seeed"
      synonyms:
        - "Seeed Part Number"
        - "Seeed Part"
        - "Seeed Part #"
        - "Seeed Studio"
        - "Seeed SKU"
        - "SKU"

  # Optional metadata (kept minimal for the stub profile).
  description: "Seeed Studio Fusion PCBA parts catalog"
  website: "https://www.seeedstudio.com"

  url_template: null
  search_url_template: null

  part_number: {}

  search:
    cache:
      ttl_hours: 24
