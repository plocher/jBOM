
fab:
  name: "PCBWay"
  id: "pcbway"
  description: "PCBWay Bill of Materials"
  pcb_manufacturing:
    website: "https://www.pcbway.com/helpcenter/assembly_help/How_to_place_an_assembly_order.html"
    # Informational: copy this .kicad_dru into your KiCad project directory.
    # KiCad DRU files are per-project; there is no system-wide install path.
    kicad_dru: "https://pcbwayfile.s3.us-west-2.amazonaws.com/web/230915/KiCAD_Custom_DRC_Rules_for_PCBWay.zip"

  # Ordered supplier profile IDs (position encodes priority).
  suppliers:
    - mouser
    - digikey
    - farnell
    - newark

  part_number:
    header: "Manufacturer Part Number"

  field_synonyms:
    fab_pn:
      # PCBWay accepts manufacturer-facing part numbers, so this remains a
      # neutral preferred-supplier alias in the profile.
      # Mechanism docs: docs/README.configuration.md#field_synonyms-mechanism.
      display_name: "Preferred Supplier PN"
    supplier_pn:
      display_name: "Supplier Part Number"
    mpn:
      synonyms:
        - "MPN"
        - "MFGPN"
        - "Manufacturer Part Number"
      display_name: "MPN"

  bom_columns:
    "Designator": "reference"
    "Quantity": "jbom:quantity"
    "Value": "value"
    "Comment": "description"
    "Package": "inv:package"
    "Manufacturer Part Number": "jbom:fabricator_part_number"

  pos_columns:
    "Designator": "reference"
    "Val": "value"
    "Package": "package"
    "Mid X": "x"
    "Mid Y": "y"
    "Rotation": "rotation"
    "Layer": "side"

  presets:
    default:
      description: "Standard PCBWay format"
      fields:
        - "reference"
        - "jbom:quantity"
        - "description"
        - "inv:package"
        - "jbom:fabricator_part_number"

  cli_aliases:
    flags: ["--pcbway"]
    presets: ["+pcbway"]

  gerbers:
    layers:
      - "F.Cu"
      - "B.Cu"
      - "F.Mask"
      - "B.Mask"
      - "F.Paste"
      - "B.Paste"
      - "F.Silkscreen"
      - "B.Silkscreen"
      - "Edge.Cuts"
    naming:
      protel_extensions: true
    drill:
      split_plated_holes: true
      map_format: "gerber"
