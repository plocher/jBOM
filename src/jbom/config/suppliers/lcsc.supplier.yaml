name: "LCSC"
id: "lcsc"
description: "LCSC Electronics (JLCPCB parts catalog)"
website: "https://www.lcsc.com"
inventory_column: "LCSC"
inventory_column_synonyms:
  - "LCSC Part"
  - "LCSC Part #"
  - "LCSC Part Number"
  - "JLC"
  - "JLC Part"
  - "JLC Part #"
  - "JLC PCB"
  - "JLC PCB Part"
  - "JLC PCB Part #"
  - "JLCPCB"
  - "JLCPCB Part"
  - "JLCPCB Part #"
  - "JLCPCB Part Number"
  - "JLC_PCB Part #"
part_number:
  pattern: "^C\\d+$"
  example: "C25231"
url_template: "https://www.lcsc.com/product-detail/{pn}.html"
search_url_template: "https://www.lcsc.com/search?q={query}"

search:
  cache:
    ttl_hours: 24

  api:
    timeout_seconds: 20.0
    max_retries: 3
    retry_delay_seconds: 1.0

  providers:
    - type: jlcpcb_api
      rate_limit_seconds: 2

  # LCSC/JLCPCB search keyword overrides.
  # Inherits baseline from generic.supplier.yaml; add LCSC-specific terms below.
  type_query_keywords:
    RES: "resistor"
    CAP: "capacitor"
    IND: "inductor"
    LED: "LED"
    DIO: "diode"
    Q: "transistor"
    IC: "IC"
    OSC: "oscillator"
    REG: "regulator"
    CON: "connector"
    CONN: "connector"
    RLY: "relay"
    SWI: "switch"
    FUS: "fuse"
