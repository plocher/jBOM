name: "LCSC"
id: "lcsc"
description: "LCSC Electronics (JLCPCB parts catalog)"
website: "https://www.lcsc.com"
inventory_column: "LCSC"
inventory_column_synonyms:
  - "LCSC Part"
  - "LCSC Part #"
  - "LCSC Part Number"
  - "JLC"
  - "JLC Part"
  - "JLC Part #"
  - "JLC PCB"
  - "JLC PCB Part"
  - "JLC PCB Part #"
  - "JLCPCB"
  - "JLCPCB Part"
  - "JLCPCB Part #"
  - "JLCPCB Part Number"
  - "JLC_PCB Part #"
part_number:
  pattern: "^C\\d+$"
  example: "C25231"
url_template: "https://www.lcsc.com/product-detail/{pn}.html"
search_url_template: "https://www.lcsc.com/search?q={query}"

search:
  cache:
    ttl_hours: 24

  providers:
    - type: jlcparts_sqlite
      db_path: "~/.cache/jbom/jlcparts/components.db"
