name: "Generic"
id: "generic"
description: "No-op supplier profile (fallback / unknown supplier)"
website: ""
inventory_column: "Supplier"
url_template: null
search_url_template: null
part_number: {}

search:
  providers:
    - type: null_api
      # No fixtures key: returns [] by default

  fields:
    - supplier_part_number
    - price
    - stock_quantity
    - lifecycle_status
    - description

  cache:
    ttl_hours: 24

  # Baseline category → search keyword mapping.
  # Supplier-specific profiles may override individual entries.
  type_query_keywords:
    RES: "resistor"
    CAP: "capacitor"
    IND: "inductor"
    LED: "LED"
    DIO: "diode"
    Z: "zener diode"
    Q: "transistor"
    IC: "IC"
    OSC: "oscillator"
    REG: "regulator"
    CON: "connector"
    CONN: "connector"
    RLY: "relay"
    SWI: "switch"
    FUS: "fuse"
    XFMR: "transformer"
    XTL: "crystal"
