name: "PCBWay"
id: "pcbway"
description: "PCBWay Bill of Materials"
website: "https://www.pcbway.com/helpcenter/assembly_help/How_to_place_an_assembly_order.html"

# Ordered supplier profile IDs (position encodes priority).
suppliers:
  - mouser
  - digikey
  - farnell
  - newark

part_number:
  header: "Manufacturer Part Number"

field_synonyms:
  fab_pn:
    display_name: "Preferred Supplier PN"
  supplier_pn:
    display_name: "Supplier Part Number"
  mpn:
    synonyms:
      - "MPN"
      - "MFGPN"
      - "Manufacturer Part Number"
    display_name: "MPN"
bom_columns:
  "Designator": "reference"
  "Quantity": "quantity"
  "Value": "value"
  "Comment": "description"
  "Package": "i:package"
  "Manufacturer Part Number": "fabricator_part_number"

pos_columns:
  "Designator": "reference"
  "Val": "value"
  "Package": "package"
  "Mid X": "x"
  "Mid Y": "y"
  "Rotation": "rotation"
  "Layer": "side"

presets:
  default:
    description: "Standard PCBWay format"
    fields:
      - "reference"
      - "quantity"
      - "description"
      - "i:package"
      - "fabricator_part_number"

cli_aliases:
  flags: ["--pcbway"]
  presets: ["+pcbway"]
