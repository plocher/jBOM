name: "PCBWay"
id: "pcbway"
description: "PCBWay Bill of Materials"
website: "https://www.pcbway.com/helpcenter/assembly_help/How_to_place_an_assembly_order.html"

part_number:
  header: "Manufacturer Part Number"

field_synonyms:
  supplier_pn:
    synonyms:
      - "Distributor Part Number"
      - "Distributor Part #"
      - "Distributor SKU"
      - "SKU"
      - "Mouser"
      - "Mouser Part Number"
      - "DigiKey"
      - "DigiKey Part Number"
      - "Arrow"
      - "Farnell"
      - "Newark"
      - "Stock Code"
    display_name: "Supplier Part Number"
  mpn:
    synonyms:
      - "MPN"
      - "MFGPN"
      - "Manufacturer Part Number"
    display_name: "MPN"

tier_rules:
  0:
    conditions:
      - field: "Consigned"
        operator: "truthy"
  1:
    conditions:
      - field: "Preferred"
        operator: "truthy"
      - field: "fab_pn"
        operator: "exists"
  2:
    conditions:
      - field: "fab_pn"
        operator: "exists"
  3:
    conditions:
      - field: "supplier_pn"
        operator: "exists"
  4:
    conditions:
      - field: "mpn"
        operator: "exists"
bom_columns:
  "Designator": "reference"
  "Quantity": "quantity"
  "Value": "value"
  "Comment": "description"
  "Package": "i:package"
  "Manufacturer Part Number": "fabricator_part_number"

pos_columns:
  "Designator": "reference"
  "Val": "value"
  "Package": "package"
  "Mid X": "x"
  "Mid Y": "y"
  "Rotation": "rotation"
  "Layer": "side"

presets:
  default:
    description: "Standard PCBWay format"
    fields:
      - "reference"
      - "quantity"
      - "description"
      - "i:package"
      - "fabricator_part_number"

cli_aliases:
  flags: ["--pcbway"]
  presets: ["+pcbway"]
