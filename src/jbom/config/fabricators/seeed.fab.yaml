name: "Seeed Studio"
id: "seeed"
description: "Seeed Studio Fusion PCBA"
website: "https://www.seeedstudio.com/fusion_pcb.html"

# Ordered supplier profile IDs (position encodes priority).
suppliers:
  - mouser
  - digikey
  - farnell
  - newark

part_number:
  header: "Seeed Part Number"

field_synonyms:
  fab_pn:
    synonyms:
      - "Seeed Part Number"
      - "Seeed"
      - "Seeed Part"
      - "Seeed Part #"
      - "Seeed Studio"
      - "Seeed SKU"
      - "SKU"
    display_name: "Seeed Part Number"
  supplier_pn:
    synonyms:
      - "Distributor Part Number"
      - "Distributor Part #"
      - "Distributor SKU"
      - "Mouser"
      - "Mouser Part Number"
      - "DigiKey"
      - "DigiKey Part Number"
      - "Arrow"
      - "Farnell"
      - "Newark"
      - "Stock Code"
    display_name: "Supplier Part Number"
  mpn:
    synonyms:
      - "MPN"
      - "MFGPN"
      - "Manufacturer Part Number"
    display_name: "MPN"

tier_rules:
  0:
    conditions:
      - field: "Consigned"
        operator: "truthy"
  1:
    conditions:
      - field: "Preferred"
        operator: "truthy"
      - field: "fab_pn"
        operator: "exists"
  2:
    conditions:
      - field: "fab_pn"
        operator: "exists"
  3:
    conditions:
      - field: "supplier_pn"
        operator: "exists"
  4:
    conditions:
      - field: "mpn"
        operator: "exists"
bom_columns:
  "Designator": "reference"
  "Quantity": "quantity"
  "Value": "value"
  "Package": "i:package"
  "Seeed Part Number": "fabricator_part_number"

pos_columns:
  "Designator": "reference"
  "Mid X": "x"
  "Mid Y": "y"
  "Layer": "side"
  "Rotation": "rotation"

presets:
  default:
    description: "Standard Seeed format"
    fields:
      - "reference"
      - "quantity"
      - "i:package"
      - "fabricator_part_number"

cli_aliases:
  flags: ["--seeed"]
  presets: ["+seeed"]
