name: "Seeed Studio"
id: "seeed"
description: "Seeed Studio Fusion PCBA"
website: "https://www.seeedstudio.com/fusion_pcb.html"

# Ordered supplier profile IDs (position encodes priority).
suppliers:
  - mouser
  - digikey
  - farnell
  - newark

part_number:
  header: "Seeed Part Number"

field_synonyms:
  fab_pn:
    display_name: "Preferred Supplier PN"
  supplier_pn:
    display_name: "Supplier Part Number"
  mpn:
    synonyms:
      - "MPN"
      - "MFGPN"
      - "Manufacturer Part Number"
    display_name: "MPN"
bom_columns:
  "Designator": "reference"
  "Quantity": "quantity"
  "Value": "value"
  "Package": "i:package"
  "Seeed Part Number": "fabricator_part_number"

pos_columns:
  "Designator": "reference"
  "Mid X": "x"
  "Mid Y": "y"
  "Layer": "side"
  "Rotation": "rotation"

presets:
  default:
    description: "Standard Seeed format"
    fields:
      - "reference"
      - "quantity"
      - "i:package"
      - "fabricator_part_number"

cli_aliases:
  flags: ["--seeed"]
  presets: ["+seeed"]
