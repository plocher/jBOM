name: "JLC"
id: "jlc"
description: "JLCPCB Fabrication Definitions"
pcb_manufacturing:
  website: "https://jlcpcb.com/help/article/Suggested-Naming-Patterns"
  kicad_dru: "https://github.com/labtroll/KiCad-DesignRules/blob/main/JLCPCB/JLCPCB.kicad_dru"
  gerbers: "kicad"
pcb_assembly:
  website: "https://jlcpcb.com/help/article/bill-of-materials-for-pcb-assembly"

part_number:
  header: "fabricator_part_number"

field_synonyms:
  fab_pn:
    synonyms:
      - "LCSC"
      - "LCSC Part"
      - "LCSC Part #"
      - "LCSC Part Number"
      - "JLC"
      - "JLC Part"
      - "JLC Part #"
      - "JLC PCB"
      - "JLC PCB Part"
      - "JLC PCB Part #"
      - "JLC_PCB Part #"
    display_name: "LCSC Part Number"
  supplier_pn:
    synonyms:
      - "Distributor Part Number"
      - "Distributor Part #"
      - "Distributor SKU"
      - "SKU"
      - "Mouser"
      - "Mouser Part Number"
      - "DigiKey"
      - "DigiKey Part Number"
      - "Arrow"
      - "Farnell"
      - "Newark"
      - "Stock Code"
    display_name: "Supplier Part Number"
  mpn:
    synonyms:
      - "MPN"
      - "MFGPN"
      - "Manufacturer Part Number"
    display_name: "MPN"

tier_rules:
  0:
    conditions:
      - field: "Consigned"
        operator: "truthy"
  1:
    conditions:
      - field: "Preferred"
        operator: "truthy"
      - field: "fab_pn"
        operator: "exists"
  2:
    conditions:
      - field: "fab_pn"
        operator: "exists"
  3:
    conditions:
      - field: "supplier_pn"
        operator: "exists"
  4:
    conditions:
      - field: "mpn"
        operator: "exists"
bom_columns:
  "Designator": "reference"
  "Quantity": "quantity"
  "Value": "value"
  "Comment": "description"
  "Footprint": "i:package"
  "LCSC": "fabricator_part_number"
  "Surface Mount": "smd"

pos_columns:
  "Designator": "reference"
  "Mid X": "x"
  "Mid Y": "y"
  "Layer": "side"
  "Rotation": "rotation"
  "Package": "package"

presets:
  default:
    description: "JLC BOM format for JLCPCB assembly"
    fields:
      - "reference"
      - "quantity"
      - "value"
      - "description"
      - "i:package"
      - "fabricator_part_number"
      - "smd"
  jlc:
    description: "JLC preset alias"
    fields:
      - "reference"
      - "quantity"
      - "value"
      - "description"
      - "fabricator_part_number"

cli_aliases:
  flags: ["--jlc"]
  presets: ["+jlc"]
