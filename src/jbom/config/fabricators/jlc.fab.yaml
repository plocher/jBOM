name: "JLC"
id: "jlc"
description: "JLCPCB Fabrication Definitions"
pcb_manufacturing:
  website: "https://jlcpcb.com/help/article/Suggested-Naming-Patterns"
  kicad_dru: "https://github.com/labtroll/KiCad-DesignRules/blob/main/JLCPCB/JLCPCB.kicad_dru"
  gerbers: "kicad"
pcb_assembly:
  website: "https://jlcpcb.com/help/article/bill-of-materials-for-pcb-assembly"

# Ordered supplier profile IDs (position encodes priority).
# First entry is the fabricator's own catalog.
suppliers:
  - lcsc
  - mouser
  - digikey
  - farnell
  - newark

part_number:
  header: "fabricator_part_number"

field_synonyms:
  fab_pn:
    # display_name is the canonical output header JLCPCB expects.
    # All synonyms are recognised as equivalent on input (--fields, bom_columns keys,
    # schematic properties, inventory columns).  The output header is always display_name.
    display_name: "LCSC Part #"
    synonyms:
      - "LCSC Part #"      # canonical JLCPCB column name (matches KiCad BOM plugin)
      - "LCSC Part Number"
      - "LCSC Part"
      - "LCSC"
      - "JLC Part #"
      - "JLC Part"
      - "JLC"
      - "JLCPCB Part #"
      - "SPN"              # normalized Supplier/SPN inventory schema
      - "spn"
  supplier_pn:
    display_name: "SPN"
    synonyms:
      - "SPN"
      - "spn"
  mpn:
    synonyms:
      - "MPN"
      - "MFGPN"
      - "Manufacturer Part Number"
    display_name: "MPN"

tier_overrides:
  - conditions:
      - field: "Consigned"
        operator: "truthy"
  - conditions:
      - field: "Preferred"
        operator: "truthy"
      - field: "fab_pn"
        operator: "exists"
bom_columns:
  "Designator": "reference"
  "Quantity": "quantity"
  "Value": "value"
  "Comment": "description"
  "Footprint": "p:k:footprint"
  "LCSC": "fabricator_part_number"  # JLCPCB requires this column name in BOM
  "Surface Mount": "smd"

pos_columns:
  "Designator": "reference"
  "Mid X": "x"
  "Mid Y": "y"
  "Layer": "side"
  "Rotation": "rotation"
  "Package": "package"

presets:
  default:
    description: "JLC BOM format for JLCPCB assembly"
    fields:
      - "reference"
      - "quantity"
      - "value"
      - "description"
      - "p:k:footprint"
      - "fabricator_part_number"
      - "smd"
  jlc:
    description: "JLC preset alias"
    fields:
      - "reference"
      - "quantity"
      - "value"
      - "description"
      - "fabricator_part_number"

cli_aliases:
  flags: ["--jlc"]
  presets: ["+jlc"]
