name: "Generic"
id: "generic"
description: "Generic fabricator template"
dynamic_name: true
name_source: "manufacturer"

# Ordered supplier profile IDs (position encodes priority).
# Generic uses a broad, permissive scope.
suppliers:
  - generic
  - lcsc
  - mouser
  - digikey
  - farnell
  - newark

part_number:
  header: "Part Number"

field_synonyms:
  supplier_pn:
    synonyms:
      - "Part Number"
      - "P/N"
      - "Part #"
      - "Supplier Part Number"
      - "Supplier P/N"
      - "Distributor Part Number"
      - "Distributor SKU"
      - "SKU"
      - "Mouser"
      - "Mouser Part Number"
      - "DigiKey"
      - "DigiKey Part Number"
      - "Arrow"
      - "Farnell"
      - "Newark"
      - "Stock Code"
      - "LCSC"
      - "LCSC Part"
      - "LCSC Part #"
      - "LCSC Part Number"
    display_name: "Part Number"
  mpn:
    synonyms:
      - "MPN"
      - "MFGPN"
      - "Manufacturer Part Number"
    display_name: "MPN"

tier_rules:
  0:
    conditions:
      - field: "supplier_pn"
        operator: "exists"
  1:
    conditions:
      - field: "mpn"
        operator: "exists"
bom_columns:
  "Reference": "reference"
  "Quantity": "quantity"
  "Description": "description"
  "Value": "value"
  "Package": "package"
  "Footprint": "footprint"
  "Manufacturer": "manufacturer"
  "Part Number": "fabricator_part_number"

pos_columns:
  "Designator": "reference"
  "Mid X": "x"
  "Mid Y": "y"
  "Layer": "side"
  "Rotation": "rotation"
  "Package": "package"

presets:
  default:
    description: "Generic BOM format"
    fields:
      - "reference"
      - "quantity"
      - "description"
      - "value"
      - "package"
      - "footprint"
      - "manufacturer"
      - "fabricator_part_number"
  generic:
    description: "Generic preset alias"
    fields:
      - "reference"
      - "quantity"
      - "description"
      - "value"
      - "manufacturer"
      - "fabricator_part_number"

cli_aliases:
  flags: ["--generic"]
  presets: ["+generic"]
