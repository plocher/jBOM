name: "Generic"
id: "generic"
description: "Generic fabricator template"
dynamic_name: true
name_source: "manufacturer"

# Ordered supplier profile IDs (position encodes priority).
# Generic uses a broad, permissive scope.
suppliers:
  - generic
  - lcsc
  - mouser
  - digikey
  - farnell
  - newark

part_number:
  header: "Part Number"

field_synonyms:
  fab_pn:
    display_name: "Preferred Supplier PN"
  supplier_pn:
    display_name: "Part Number"
  mpn:
    synonyms:
      - "MPN"
      - "MFGPN"
      - "Manufacturer Part Number"
    display_name: "MPN"
bom_columns:
  "Reference": "reference"
  "Quantity": "quantity"
  "Description": "description"
  "Value": "value"
  "Package": "package"
  "Footprint": "footprint"
  "Manufacturer": "manufacturer"
  "Part Number": "fabricator_part_number"

pos_columns:
  "Designator": "reference"
  "Mid X": "x"
  "Mid Y": "y"
  "Layer": "side"
  "Rotation": "rotation"
  "Package": "package"

# Baseline field set used when users append fields via +syntax (for example,
# --fields +Value) so additive behavior stays profile-driven and predictable.
pos_additive_default_fields:
  - "reference"
  - "x"
  - "y"
  - "rotation"
  - "side"
  - "footprint"
  - "package"

presets:
  default:
    description: "Generic BOM format"
    fields:
      - "reference"
      - "quantity"
      - "description"
      - "value"
      - "package"
      - "footprint"
      - "manufacturer"
      - "fabricator_part_number"
  generic:
    description: "Generic preset alias"
    fields:
      - "reference"
      - "quantity"
      - "description"
      - "value"
      - "manufacturer"
      - "fabricator_part_number"

cli_aliases:
  flags: ["--generic"]
  presets: ["+generic"]
